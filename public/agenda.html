<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RECURSIVE — Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Brand palette from recursive.to ── */
  --bg:    #0e0a06;        /* deep warm black */
  --srf:   #2a1508;        /* header bg — matches logo PNG background exactly */
  --srf2:  #1a0d06;        /* tab bar — gradient step between header and page */
  --bdr:   rgba(255,238,200,0.1);
  --text:  #ffeec8;        /* brand cream */
  --dim:   rgba(255,238,200,0.44);
  --faint: rgba(255,238,200,0.2);

  /* ── Room accent colours ── */
  --lib:   #6a5030;        /* antique bronze — Library meals sidebar (dim) */
  --gal:   #ffeec8;        /* Gallery = brand cream (primary accent) */
  --sal:   #c8844a;        /* Salon = warm terracotta (earthy complement to cream) */

  /* ── Layout heights ── */
  --hdr: 78px;
  --tab: 46px;
  --col: 40px;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ═══ HEADER ═══════════════════════════════════════════════════════════════ */
.hdr {
  flex-shrink: 0; height: var(--hdr);
  background: var(--srf); border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 52px; position: relative;
}
/* Cream shimmer line under header */
.hdr::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--text) 20%, var(--text) 80%, transparent 100%);
  opacity: 0.25;
}
/* Logo image — blends seamlessly since its bg matches --srf (#2a1508) */
.hdr-brand { display: flex; flex-direction: column; gap: 4px; justify-content: center; }
.hdr-logo  { height: 50px; width: auto; display: block; align-self: flex-start; }
.conf-sub  { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); font-weight: 400; }
.hdr-r     { text-align: right; }
.clock     { font-family: 'DM Sans', sans-serif; font-size: 30px; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 300; }
.clock-d   { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-top: 4px; }

/* ═══ TABS ══════════════════════════════════════════════════════════════════ */
.tabs {
  flex-shrink: 0; height: var(--tab);
  background: var(--srf2); border-bottom: 1px solid var(--bdr);
  display: flex; align-items: stretch; padding: 0 52px;
}
.tab {
  font-family: 'DM Sans', sans-serif; font-weight: 600;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--dim); background: none; border: none;
  border-bottom: 2px solid transparent; padding: 0 24px;
  cursor: pointer; margin-bottom: -1px; transition: color .15s, border-color .15s;
}
.tab.on { color: var(--text); border-bottom-color: var(--text); }
.tab:hover:not(.on) { color: rgba(255,238,200,0.7); }
.legend { margin-left: auto; display: flex; align-items: center; gap: 20px; }
.leg    { display: flex; align-items: center; gap: 7px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); font-family: 'DM Sans', sans-serif; }
.lpip   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ═══ APP ═══════════════════════════════════════════════════════════════════ */
#app { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.day { display: none; flex: 1; min-height: 0; flex-direction: row; }
.day.on { display: flex; }

/* ═══ TIME GUTTER ═══════════════════════════════════════════════════════════ */
.gutter {
  flex-shrink: 0; width: 60px;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--bdr);
}
.g-head { height: var(--col); flex-shrink: 0; border-bottom: 1px solid var(--bdr); }
.g-body { flex: 1; position: relative; min-height: 0; overflow: hidden; }
.t-lbl  {
  position: absolute; right: 8px; transform: translateY(-50%);
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 400;
  font-variant-numeric: tabular-nums; color: var(--faint); white-space: nowrap;
}

/* ═══ ROOM COLUMNS ══════════════════════════════════════════════════════════ */
.rooms { flex: 1; display: flex; min-width: 0; }

.rm {
  display: flex; flex-direction: column; min-width: 0;
  border-right: 1px solid var(--bdr);
}
.rm:last-child { border-right: none; }

.rm-lib { flex: 0 0 130px; }
.rm-gal, .rm-sal { flex: 1; }

.rm-head {
  height: var(--col); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--bdr);
  font-family: 'DM Sans', sans-serif; font-weight: 700;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; gap: 8px;
}
.r-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.rm-lib .rm-head { color: #a07848; } .rm-lib .r-dot { background: #a07848; }
.rm-gal .rm-head { color: var(--gal); } .rm-gal .r-dot { background: var(--gal); }
.rm-sal .rm-head { color: var(--sal); } .rm-sal .r-dot { background: var(--sal); }

.rm-body { flex: 1; position: relative; min-height: 0; overflow: hidden; }

/* Grid lines — warm-tinted to match page */
.gline   { position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,238,200,0.04); pointer-events: none; }
.gline-h { background: rgba(255,238,200,0.08); }

/* ═══ SESSION CARDS ══════════════════════════════════════════════════════════
 *  Minimum height + z-index stacking: see previous comments for rationale.
 * ========================================================================== */
.sess {
  position: absolute;
  left: 4px; right: 4px;
  border-radius: 2px;
  overflow: hidden;
  padding: 6px 11px 4px;
  display: flex; flex-direction: column; justify-content: flex-start;
}

/* Opaque near-black card backgrounds — warm brown tint matches brand */
.s-lib { background: #170d06; border-left: 3px solid #a07848; }
.s-gal {
  background: #1d1208;
  border-left: 3px solid var(--gal);
  box-shadow: inset 2px 0 18px rgba(255,238,200,0.05);
}
.s-sal { background: #1a0e06; border-left: 3px solid var(--sal); }

.s-meal   { opacity: 0.35 !important; border-left-style: dashed !important; }
.s-social { border-left-width: 1px !important; opacity: 0.6 !important; }

/* Currently-running: border + inner glow strengthen the accent */
.s-lib.current {
  border-left-color: #c8a060; border-left-width: 4px;
  box-shadow: inset 0 0 24px rgba(200,160,96,0.14);
}
.s-gal.current {
  border-left-color: #fff4e0; border-left-width: 4px;
  box-shadow: inset 0 0 28px rgba(255,238,200,0.14);
}
.s-sal.current {
  border-left-color: #e8a870; border-left-width: 4px;
  box-shadow: inset 0 0 24px rgba(200,132,74,0.14);
}

.s-ttl {
  font-family: 'DM Sans', sans-serif; font-weight: 600;
  font-size: 15px; line-height: 1.25; color: var(--text);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.s-ppl {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
  color: var(--dim); margin-top: 2px;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.s-t {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 300;
  font-variant-numeric: tabular-nums; color: var(--faint); margin-top: 2px;
}
.s-meal .s-ppl { display: none; }

.sess { min-height: 54px; }
.sess.s-meal, .sess.s-social { min-height: 0; }

/* ═══ NOW LINE ═══════════════════════════════════════════════════════════════ */
.nowl {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--text); z-index: 200; pointer-events: none;
  box-shadow: 0 0 10px rgba(255,238,200,0.7), 0 0 28px rgba(255,238,200,0.3);
  animation: npulse 2.4s ease-in-out infinite;
}
.nowl::before {
  content: ''; position: absolute; left: -3px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--text); box-shadow: 0 0 8px rgba(255,238,200,0.9);
}
@keyframes npulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

.col-empty {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 400;
  letter-spacing: 0.14em; color: rgba(255,238,200,0.1);
  text-transform: uppercase; pointer-events: none; white-space: nowrap;
}
</style>
</head>

const DAYS  = ['2026-05-15','2026-05-16','2026-05-17'];
const ROOMS = ['Library','Gallery','Salon'];
const RC    = {Library:'lib', Gallery:'gal', Salon:'sal'};
const RANGE = {
  '2026-05-15': [19*60,      24*60      ],
  '2026-05-16': [8*60+30,    20*60+30   ],
  '2026-05-17': [8*60+30,    20*60+30   ],
};

// Percentage helper — positions everything relative to the schedule body.
// Using % instead of px means zoom-in/zoom-out and any screen height
// automatically scales the layout correctly with zero JS recalculation.
function pct(min, start, span) {
  return ((min - start) / span * 100).toFixed(3) + '%';
}

function toM(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function fmtT(min) {
  const h24 = Math.floor(min / 60) % 24;
  const m   = String(min % 60).padStart(2, '0');
  const h12 = h24 % 12 || 12;
  const ap  = h24 < 12 ? 'a' : 'p';
  return `${h12}:${m}${ap}`;
}

function buildDay(date) {
  const [ds, de] = RANGE[date];
  const span  = de - ds;
  const sessions = DATA.filter(x => x.d === date);

  const panel = document.createElement('div');
  panel.className = 'day';
  panel.dataset.date = date;

  // Time gutter — percentage positions, scales correctly at any zoom level
  const gutter = document.createElement('div');
  gutter.className = 'gutter';
  gutter.appendChild(Object.assign(document.createElement('div'), {className:'g-head'}));
  const gb = document.createElement('div');
  gb.className = 'g-body';
  for (let t = ds; t <= de; t += 30) {
    const lbl = document.createElement('div');
    lbl.className = 't-lbl';
    lbl.style.top = pct(t, ds, span);
    lbl.textContent = fmtT(t);
    gb.appendChild(lbl);
  }
  gutter.appendChild(gb);

  // Room columns
  const roomsEl = document.createElement('div');
  roomsEl.className = 'rooms';

  ROOMS.forEach(room => {
    const rc  = RC[room];
    const col = document.createElement('div');
    col.className = `rm rm-${rc}`;

    const head = document.createElement('div');
    head.className = 'rm-head';
    const dot = document.createElement('div');
    dot.className = 'r-dot';
    head.appendChild(dot);
    head.appendChild(document.createTextNode(room));
    col.appendChild(head);

    const body = document.createElement('div');
    body.className = 'rm-body';

    // Grid lines — percentage, auto-scales
    for (let t = ds; t <= de; t += 30) {
      const gl = document.createElement('div');
      gl.className = 'gline' + (t % 60 === 0 ? ' gline-h' : '');
      gl.style.top = pct(t, ds, span);
      body.appendChild(gl);
    }

    // Now-line — no pixel bh stored; updateNow() computes percentage directly
    const nl = document.createElement('div');
    nl.className = 'nowl';
    nl.style.display = 'none';
    nl.dataset.start = ds;
    nl.dataset.span  = span;
    body.appendChild(nl);

    // Sessions:
    //  • top  = percentage of schedule body → zoom-proof positioning
    //  • height = percentage of schedule body; CSS min-height: 54px (in stylesheet)
    //    ensures short slots are always readable regardless of screen size
    //  • z-index ascending by time → later cards draw on top of earlier overflow;
    //    opaque card backgrounds prevent see-through artifacts
    const roomSess = sessions
      .filter(s => s.rm === room)
      .sort((a, b) => toM(a.s) - toM(b.s));

    if (!roomSess.length) {
      const el = document.createElement('div');
      el.className = 'col-empty';
      el.textContent = 'no sessions';
      body.appendChild(el);
    }

    roomSess.forEach((s, idx) => {
      const sm   = toM(s.s);
      const isMeal   = s.type === 'meal';
      const isSocial = s.type === 'social';

      const card = document.createElement('div');
      card.className = `sess s-${rc}` +
        (isMeal   ? ' s-meal'   : '') +
        (isSocial ? ' s-social' : '');
      card.style.top    = pct(sm, ds, span);
      card.style.height = (s.dur / span * 100).toFixed(3) + '%';
      card.style.zIndex = idx + 1;
      card.dataset.sm   = sm;
      card.dataset.dur  = s.dur;

      const tEl = document.createElement('div');
      tEl.className = 's-ttl';
      tEl.textContent = s.title;
      card.appendChild(tEl);

      if (s.ppl && !isMeal) {
        const pEl = document.createElement('div');
        pEl.className = 's-ppl';
        pEl.textContent = s.ppl;
        card.appendChild(pEl);
      }

      const tmEl = document.createElement('div');
      tmEl.className = 's-t';
      tmEl.textContent = fmtT(sm);
      card.appendChild(tmEl);

      body.appendChild(card);
    });

    col.appendChild(body);
    roomsEl.appendChild(col);
  });

  panel.appendChild(gutter);
  panel.appendChild(roomsEl);
  return panel;
}

// Init
const app = document.getElementById('app');
DAYS.forEach(d => app.appendChild(buildDay(d)));

function setDay(date) {
  document.querySelectorAll('.tab').forEach(b =>
    b.classList.toggle('on', b.dataset.d === date));
  document.querySelectorAll('.day').forEach(p =>
    p.classList.toggle('on', p.dataset.date === date));
  updateNow();
}

document.querySelectorAll('.tab').forEach(b =>
  b.addEventListener('click', () => setDay(b.dataset.d)));

const todayStr = (() => {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
})();
setDay(DAYS.includes(todayStr) ? todayStr : DAYS[0]);

function updateClock() {
  const n = new Date();
  const h24 = n.getHours();
  const h12 = h24 % 12 || 12;
  const mm  = String(n.getMinutes()).padStart(2, '0');
  const ap  = h24 < 12 ? 'AM' : 'PM';
  document.getElementById('clk').textContent = `${h12}:${mm} ${ap}`;
  const wd = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n.getDay()];
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][n.getMonth()];
  document.getElementById('clkd').textContent = `${wd} · ${mo} ${n.getDate()}`;
}

function updateNow() {
  const n      = new Date();
  const today  = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  const nowMin = n.getHours() * 60 + n.getMinutes();

  document.querySelectorAll('.nowl').forEach(el => {
    const panel = el.closest('.day');
    if (!panel || panel.dataset.date !== today) { el.style.display = 'none'; return; }
    const start  = parseInt(el.dataset.start);
    const span   = parseInt(el.dataset.span);
    const nowPct = (nowMin - start) / span * 100;
    if (nowPct < 0 || nowPct > 100) { el.style.display = 'none'; }
    else { el.style.display = 'block'; el.style.top = nowPct.toFixed(2) + '%'; }
  });

  document.querySelectorAll('.sess').forEach(el => {
    const panel   = el.closest('.day');
    const isToday = panel?.dataset.date === today;
    const sm      = parseInt(el.dataset.sm);
    const dur     = parseInt(el.dataset.dur);
    el.classList.toggle('current', isToday && nowMin >= sm && nowMin < sm + dur);
  });
}

updateClock();
setInterval(updateClock, 15000);
setInterval(updateNow,   60000);
</script>
